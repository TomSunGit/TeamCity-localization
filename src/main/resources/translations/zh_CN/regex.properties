# Regex translations.
# Define rules in pairs: <id>.pattern=... and <id>.replacement=...
# Rules are applied in alphabetical order of <id> (so use prefixed numbers for ordering).
# Pattern uses JS regex syntax (no surrounding /.../). Backslashes in properties must be doubled (\\d+).
# In replacement, $1 / $2 / ... refer to capture groups.

# === Time ago ===
10.ago.second.pattern=^(\\d+)\\s+seconds?\\s+ago$
10.ago.second.replacement=$1 秒前
11.ago.minute.pattern=^(\\d+)\\s+minutes?\\s+ago$
11.ago.minute.replacement=$1 分钟前
12.ago.hour.pattern=^(\\d+)\\s+hours?\\s+ago$
12.ago.hour.replacement=$1 小时前
13.ago.day.pattern=^(\\d+)\\s+days?\\s+ago$
13.ago.day.replacement=$1 天前
14.ago.week.pattern=^(\\d+)\\s+weeks?\\s+ago$
14.ago.week.replacement=$1 周前
15.ago.month.pattern=^(\\d+)\\s+months?\\s+ago$
15.ago.month.replacement=$1 个月前
16.ago.year.pattern=^(\\d+)\\s+years?\\s+ago$
16.ago.year.replacement=$1 年前
17.ago.over-year.pattern=^over\\s+(\\d+)\\s+years?\\s+ago$
17.ago.over-year.replacement=超过 $1 年前
18.ago.over-month.pattern=^over\\s+(\\d+)\\s+months?\\s+ago$
18.ago.over-month.replacement=超过 $1 个月前
19.ago.about-month.pattern=^about\\s+(\\d+)\\s+months?\\s+ago$
19.ago.about-month.replacement=约 $1 个月前

# === Sizes ===
20.size.mb-lt.pattern=^<\\s*(\\d+(?:\\.\\d+)?)\\s+MB$
20.size.mb-lt.replacement=<$1 MB
21.size.mb.pattern=^(\\d+(?:\\.\\d+)?)\\s+MB$
21.size.mb.replacement=$1 MB
22.size.kb.pattern=^(\\d+(?:\\.\\d+)?)\\s+KB$
22.size.kb.replacement=$1 KB
23.size.gb.pattern=^(\\d+(?:\\.\\d+)?)\\s+GB$
23.size.gb.replacement=$1 GB
24.size.tb.pattern=^(\\d+(?:\\.\\d+)?)\\s+TB$
24.size.tb.replacement=$1 TB

# === Counts ===
30.count.errors.pattern=^(\\d+)\\s+errors?$
30.count.errors.replacement=$1 个错误
31.count.warnings.pattern=^(\\d+)\\s+warnings?$
31.count.warnings.replacement=$1 个警告
32.count.builds-found.pattern=^(\\d+)\\s+builds?\\s+found$
32.count.builds-found.replacement=找到 $1 个构建
33.count.builds-in-queue.pattern=^(\\d+)\\s+builds?\\s+in\\s+queue$
33.count.builds-in-queue.replacement=队列中 $1 个构建
34.count.tests-failed.pattern=^(\\d+)\\s+tests?\\s+failed$
34.count.tests-failed.replacement=$1 个测试失败
35.count.tests-passed.pattern=^(\\d+)\\s+tests?\\s+passed$
35.count.tests-passed.replacement=$1 个测试通过
36.count.running-builds.pattern=^(\\d+)\\s+currently\\s+running\\s+builds?$
36.count.running-builds.replacement=$1 个正在运行的构建
37.count.changes.pattern=^(\\d+)\\s+changes?$
37.count.changes.replacement=$1 个变更

# === Build / project labels ===
40.build-num.pattern=^Build\\s+(\\d+)$
40.build-num.replacement=构建 $1

# === Sidebar widgets ===
50.queue-builds.pattern=^Queue\\:\\s*(\\d+)\\s+builds?$
50.queue-builds.replacement=队列：$1 个构建
51.my-investigations.pattern=^My\\s+Investigations\\:\\s*(\\d+)$
51.my-investigations.replacement=我的调查：$1
52.totals.pattern=^Total\\:\\s*(\\d+)$
52.totals.replacement=总计：$1
53.idle.pattern=^Idle\\:\\s*(\\d+)$
53.idle.replacement=空闲：$1
54.busy.pattern=^Busy\\:\\s*(\\d+)$
54.busy.replacement=忙碌：$1
55.running.pattern=^Running\\:\\s*(\\d+)$
55.running.replacement=运行中：$1

# === Date short ===
60.date-month-day.pattern=^(\\d{1,2})\\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)$
60.date-month-day.replacement=$2 月 $1 日

# Note: cross-unit triggered-ago patterns require unit translation; left for future work.

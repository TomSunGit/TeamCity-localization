# Prefix-match translations: if node.text starts with key, replace key portion with value
# Useful for "Build #123" → "构建 #123" patterns
# Note: longest prefix wins (sorted by key length descending in JS)
# Format: english_prefix=中文前缀

Build\ #=构建 #
Project\ #=项目 #
Agent\ #=代理 #
Showing\ =正在显示\
Last\ build:\ =上次构建：\
Started\ by\ =启动者：\
Triggered\ by\ =触发者：\
